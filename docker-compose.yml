# `docker compose up` starts the whole system: Postgres + the Intelligence API,
# then a one-shot `seed` container replays sample events so the dashboard is live
# immediately. No manual steps beyond `git clone`.
#
#   API:        http://localhost:8000      docs: /docs
#   Dashboard:  http://localhost:8000/dashboard/

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d store"]
      interval: 5s
      timeout: 3s
      retries: 10
    # not published by default; the API reaches it over the compose network

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/store
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      # host data (store_layout.json, real pos_transactions.csv, events.jsonl) wins
      # over the copy baked into the image, so you can use real pipeline output
      # without rebuilding.
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # One-shot: streams sample_events.jsonl into the API in simulated real time so the
  # dashboard shows live data on first boot. Idempotent (ingest dedups by event_id).
  seed:
    build: .
    command: ["python", "scripts/replay.py", "--api", "http://api:8000", "--speed", "90"]
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
